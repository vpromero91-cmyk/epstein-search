<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epstein Files: Searchable Research Archive</title>
    <style>
  :root {
    --bg: #050708;
    --bg-soft: #0b0f11;
    --panel: #101619;
    --panel-light: #151d21;
    --text: #e8e0d2;
    --muted: #a99f90;
    --faint: #6f6a61;
    --gold: #c8a76a;
    --gold-soft: #e1c994;
    --border: rgba(200, 167, 106, 0.32);
    --shadow: rgba(0, 0, 0, 0.65);
  }

  body {
    font-family: Georgia, "Times New Roman", serif;
    max-width: 1100px;
    margin: 24px auto;
    padding: 0 18px;
    background:
      radial-gradient(circle at top right, rgba(200, 167, 106, 0.12), transparent 32%),
      linear-gradient(180deg, #080b0d 0%, #030405 100%);
    color: var(--text);
  }

  h1 {
    font-weight: 400;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    padding-bottom: 16px;
    margin-bottom: 24px;
  }

  form {
    background: linear-gradient(180deg, var(--panel-light), var(--panel));
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    box-shadow: 0 18px 40px var(--shadow);
    margin-bottom: 20px;
  }

  label {
    color: var(--muted);
    font-size: 0.92rem;
    letter-spacing: 0.03em;
  }

  input[type="checkbox"] {
    accent-color: var(--gold);
  }

  input[type="search"] {
    width: 70%;
    padding: 10px 12px;
    background: #070a0c;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    outline: none;
    font-family: Arial, sans-serif;
  }

  input[type="search"]::placeholder {
    color: var(--faint);
  }

  input[type="search"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200, 167, 106, 0.14);
  }

  button,
  .copy-btn {
    background: var(--gold-soft);
    color: #080808;
    padding: 10px 16px;
    border: 1px solid var(--gold);
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 700;
  }

  button:hover,
  .copy-btn:hover {
    background: var(--gold);
  }

  .copy-btn.copied {
    background: #6f8f68;
    border-color: #8fb885;
    color: white;
  }

  #status {
    color: var(--muted);
    font-style: italic;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: linear-gradient(180deg, #11191d, #080b0d);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 10px;
    box-shadow: 0 14px 28px var(--shadow);
  }

  .card:hover {
    border-color: rgba(225, 201, 148, 0.65);
    transform: translateY(-2px);
    transition: 0.2s ease;
  }

  .card img {
    cursor: pointer;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.08);
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
  }

  .desc {
    font-size: 0.9rem;
    color: var(--text);
    margin-top: 8px;
    line-height: 1.45;
  }

  .fname {
    font-size: 0.78rem;
    color: var(--faint);
    margin-top: 6px;
    word-break: break-all;
    font-family: Arial, sans-serif;
  }

  .visible-text {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 8px;
    white-space: pre-wrap;
    max-height: 6em;
    overflow: hidden;
    font-family: Arial, sans-serif;
    line-height: 1.45;
  }

  #pagination {
    margin-top: 24px;
  }

  /* Modal styles */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    inset: 0;
    background-color: rgba(0, 0, 0, 0.86);
    backdrop-filter: blur(4px);
  }

  .modal.show {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-content {
    background: linear-gradient(180deg, #11191d, #050708);
    color: var(--text);
    padding: 22px;
    border-radius: 12px;
    border: 1px solid var(--border);
    max-width: 90vw;
    max-height: 90vh;
    overflow: auto;
    position: relative;
    box-shadow: 0 20px 60px black;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    color: var(--muted);
  }

  .modal-close:hover {
    color: var(--gold-soft);
  }

  .modal-image {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 8px;
  }

  .modal-info {
    margin-top: 15px;
    color: var(--muted);
  }

  .modal-filepath {
    background: #070a0c;
    border: 1px solid var(--border);
    color: var(--gold-soft);
    padding: 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.9rem;
    word-break: break-all;
    margin: 10px 0;
  }
</style>
  </head>
  <body>
    <h1>Epstein Files: Searchable Research Archive</h1>

    <form id="searchForm">
      <div style="margin-bottom:12px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <label style="display:flex; align-items:center; gap:6px;">
          <input id="searchDescription" type="checkbox" checked />
          Search image description
        </label>

        <label style="display:flex; align-items:center; gap:6px;">
          <input id="searchVisibleText" type="checkbox" checked />
          Search visible text
        </label>
      </div>

      <input id="q" type="search" placeholder="Search descriptions or visible text (e.g. bed, building, baby...)" style="width:70%; padding:8px" />
      <button type="submit" style="padding:8px 12px">Search</button>
    </form>

    <p id="status"></p>
    <div id="results" class="grid"></div>
    <div id="pagination"></div>

    <!-- Modal for full-size image -->
    <div id="imageModal" class="modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <img id="modalImage" class="modal-image" src="" alt="" />
        <div class="modal-info" id="modalInfo"></div>
      </div>
    </div>

        <!-- Buy Me a Coffee -->
    <script
      type="text/javascript"
      src="https://cdnjs.buymeacoffee.com/1.0.0/button.prod.min.js"
      data-name="bmc-button"
      data-slug="viktorrose"
      data-color="#FFDD00"
      data-emoji=""
      data-font="Cookie"
      data-text="Buy me a coffee"
      data-outline-color="#000000"
      data-font-color="#000000"
      data-coffee-color="#ffffff">
    </script>

    <script src="/static/main.js"></script>
  </body>
</html>
