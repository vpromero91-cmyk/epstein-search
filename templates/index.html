<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Epstein Files: Searchable Research Archive</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
      .card { border: 1px solid #ddd; padding: 8px; border-radius: 6px; }
      .card img { cursor: pointer; }
      img { max-width: 100%; height: auto; display: block; }
      .desc { font-size: 0.9rem; color: #333; margin-top: 6px; }
      .fname { font-size: 0.8rem; color: #666; margin-top: 4px; word-break: break-all; }
      .visible-text { font-size: 0.8rem; color: #444; margin-top: 6px; white-space: pre-wrap; max-height: 6em; overflow: hidden; }

      /* Modal styles */
      .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); }
      .modal.show { display: flex; align-items: center; justify-content: center; }
      .modal-content { background-color: white; padding: 20px; border-radius: 8px; max-width: 90vw; max-height: 90vh; overflow: auto; position: relative; }
      .modal-close { position: absolute; top: 10px; right: 10px; font-size: 24px; font-weight: bold; cursor: pointer; }
      .modal-close:hover { color: red; }
      .modal-image { max-width: 100%; max-height: 70vh; }
      .modal-info { margin-top: 15px; }
      .modal-filepath { background: #f0f0f0; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.9rem; word-break: break-all; margin: 10px 0; }
      .copy-btn { background: #007bff; color: white; padding: 8px 12px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
      .copy-btn:hover { background: #0056b3; }
      .copy-btn.copied { background: #28a745; }
    </style>
  </head>
  <body>
    <h1>Epstein Files: Searchable Research Archive</h1>

    <form id="searchForm">
      <div style="margin-bottom:12px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
        <label style="display:flex; align-items:center; gap:6px;">
          <input id="searchDescription" type="checkbox" checked />
          Search image description
        </label>

        <label style="display:flex; align-items:center; gap:6px;">
          <input id="searchVisibleText" type="checkbox" checked />
          Search visible text
        </label>
      </div>

      <input id="q" type="search" placeholder="Search descriptions or visible text (e.g. bed, building, baby...)" style="width:70%; padding:8px" />
      <button type="submit" style="padding:8px 12px">Search</button>
    </form>

    <p id="status"></p>
    <div id="results" class="grid"></div>
    <div id="pagination"></div>

    <!-- Modal for full-size image -->
    <div id="imageModal" class="modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <img id="modalImage" class="modal-image" src="" alt="" />
        <div class="modal-info" id="modalInfo"></div>
      </div>
    </div>

    <script src="/static/main.js"></script>
  </body>
</html>
