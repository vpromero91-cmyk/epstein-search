<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Age Verification</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 600px;
        margin: 80px auto;
        text-align: center;
      }

      .box {
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 30px;
      }

      button {
        padding: 10px 16px;
        margin: 8px;
        cursor: pointer;
      }

      .error {
        color: red;
        margin-bottom: 15px;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Age Verification</h1>

      <p>This site contains sensitive material. You must be 18 or older to continue.</p>

      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}

      <form method="post">
        <button type="submit" name="over_18" value="yes">
          I am 18 or older
        </button>

        <button type="submit" name="over_18" value="no">
          I am under 18
        </button>
      </form>
    </div>
  </body>
</html>
